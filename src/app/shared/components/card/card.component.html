<header class="text-white text-center bg-primary p-2 mt-5">
    <h2>Cards-3</h2>
</header>


<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 mx-auto mb-4 md-0">
             <mat-card>
                <h2 class="text-center">
                    {{isInEditMode?'Update Card':'Add Card'}}
                </h2>
            <div class="card">
                <div class="card-body">
                    <div class="form-group">
                        <label for="Title">Title</label>
                        <input #Title type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="body">Content</label>
                        <textarea #body rows="4" class="form-control"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="userId">UserId</label>
                        <select #userId class="form-control">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>


                        </select>

                    </div>
                    <button *ngIf="!isInEditMode" mat-raised-button color="primary"  (click)="onpostAdd(Title,body,userId)"
                        class="btn-block">Add post</button>
                    <button *ngIf="isInEditMode" mat-raised-button color="primary" (click)="onUpdate()"
                        class="btn-block">Update Post</button>
                </div>
            </div>
            </mat-card>
        </div>
    </div>

    <div class="row" *ngIf="postArr.length > 0 ;else nocards">
        <div class="col-md-4 mb-4" *ngFor="let post of postArr; trackBy:trackBycard">

            <div class="card">
                <mat-card>
                <div class="card-header">
                    <h2 class="text-primary">{{post.title}}</h2>
                </div>
                <div class="card-body">
                    <p>{{post.body}}</p>
                </div>
                <div class="card-footer d-flex justify-content-between">
                    <button (click)="onEdit(post)" mat-raised-button color="primary"
                                    class="btn btn-sm">Edit</button>
                    <button (click)="onRemove(post.id)" mat-raised-button color="warn"
                                    class="btn btn-sm">Remove</button>

                </div>
                </mat-card>
            </div>
        </div>
    </div>
    <ng-template #nocards>
        <p class="alert alert-primary">No Cards Data added yet !!!</p>

    </ng-template>

</div>
