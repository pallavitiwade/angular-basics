<div class="container mt-5">
    <div class="row">

        <div class="col-md-4 mb-4 md-0">
            <mat-card>
                <h2 class="text-center">
                    {{IsinEditMode?'Update Student':'Add Student'}}
                </h2>
                <div class="form-group">
                    <label for="Fullname">Fullname</label>
                    <input type="text" #Fullname class="form-control">
                </div>

                
                <div class="form-group">
                    <label for="Email">Email</label>
                    <input type="text" #Email class="form-control">
                </div>
                <div class="form-group">
                    <label for="contact">contact</label>
                    <input type="text" #contact class="form-control">
                </div>
                <div class="form-group">
                    <label for="IsActive">IsActive</label>
                    <select type="text" #IsActive class="form-control">
                        <option value="true">yes</option>
                        <option value="false">No</option>


                    </select>
                </div>
                <button *ngIf="!IsinEditMode" mat-raised-button color="primary" class="btn-block"
                    (click)="StudentAdd()">Add Student</button>
                <button *ngIf="IsinEditMode" mat-raised-button color="primary" class="btn-block"
                    (click)="onUpdate()">Update</button>

            </mat-card>
        </div>


        <div class="col-md-8">
            <mat-card class="table-responsive">
                <table class="table table-bordered text-center" *ngIf="studentArr.length > 0 ;else notabal">
                    <thead>
                        <tr>
                            <th>SR.No</th>
                            <th>Fullname</th>
                            <th>Email</th>
                            <th>contact</th>
                            <th>isactive</th>
                            <th>Edit</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let student of studentArr;let i=index; trackBy:trackByStudent">
                            <td>{{i+1}}</td>
                            <td>{{student.Fullname}}</td>
                            <td>{{student.Email}}</td>
                            <td>{{student.contact}}</td>
                            <td>
                                <span class="badge text-white p-3" [ngClass]="{
                    'bg-success':student.IsActive,
                    'bg-danger':!student.IsActive
                    }">

                                    {{student.IsActive?'yes':'No'}}
                                </span>
                            </td>
                            <td class="text-center">
                                <!-- <button (click)="onEdit(student)" mat-raised-button color="primary"
                                    class="btn btn-sm">Edit</button> -->

                                <button (click)="onEdit(student)" mat-mini-fab color="primary">
                                    <mat-icon>edit</mat-icon>
                                </button>

                            </td>

                            <td class="text-center">
                                <!-- <button (click)="onRemove(student.id)" mat-raised-button color="warn"
                                    class="btn btn-sm">Remove</button> -->
                                <button (click)="onRemove(student.id)" mat-mini-fab color="warn">
                                    <mat-icon>delete</mat-icon>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <ng-template #notabal>
                    <p class="alert alert-info">No Table Data added yet !!!</p>
                </ng-template>
            </mat-card>

        </div>
    </div>
</div>
